AWSTemplateFormatVersion: "2010-09-09"
Description: 'IAM Roles for ECS, AWS Glue with S3 Read/Write permissions'

Resources:
  GlueExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: okgl-glue-execution-role
      # Trust policy
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
        - !Ref GlueS3RawReadPolicy
        - !Ref GlueS3SilverWritePolicy
        - !Ref GlueS3ScriptReadPolicy

  # Allow Glue to list and read CSV files from the raw S3 prefix
  GlueS3RawReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: okgl-glue-s3-raw-read
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ListRawPrefix
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource:
              - arn:aws:s3:::oklahoma-gl-test
            Condition:
              StringLike:
                s3:prefix:
                  - raw/*
                  - raw
          - Sid: ReadRawObjects
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:GetObjectVersion
            Resource:
              - arn:aws:s3:::oklahoma-gl-test/raw/*

  # Allow Glue to read its own script from S3 at job startup
  GlueS3ScriptReadPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: okgl-glue-s3-script-read
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ReadGlueScript
            Effect: Allow
            Action:
              - s3:GetObject
            Resource:
              - arn:aws:s3:::oklahoma-gl-test/glue/scripts/*

  # Allow Glue to write Parquet files to the silver S3 prefix
  GlueS3SilverWritePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: okgl-glue-s3-silver-write
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: ListSilverAndMetadataPrefix
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource:
              - arn:aws:s3:::oklahoma-gl-test
            Condition:
              StringLike:
                s3:prefix:
                  - silver/*
                  - silver
                  - metadata/*
                  - metadata
          - Sid: WriteSilverObjects
            Effect: Allow
            Action:
              - s3:PutObject
              - s3:DeleteObject
            Resource:
              - arn:aws:s3:::oklahoma-gl-test/silver/*
              - arn:aws:s3:::oklahoma-gl-test/silver_$folder$
              - arn:aws:s3:::oklahoma-gl-test/metadata/*
              - arn:aws:s3:::oklahoma-gl-test/metadata_$folder$

  # ECS Roles
  # Allow ECS agent to pull container image from ECR and write logs to CloudWatch
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: okgl-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      # ECS read & CloudWatch write
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # Allow container data pipeline to call s3 / dynamodb
  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: okgl-ecs-task-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref EcsS3RawWritePolicy
        - !Ref EcsDynamoDBPolicy

  # Allow the docker container to write fetched CSV files to S3
  EcsS3RawWritePolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: okgl-ecs-s3-raw-write
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ListRawPrefix
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource:
              - arn:aws:s3:::oklahoma-gl-test
            Condition:
              StringLike:
                s3:prefix:
                  - raw/*
                  - raw
          - Sid: WriteRawObjects
            Effect: Allow
            Action:
              - s3:PutObject
            Resource:
              - arn:aws:s3:::oklahoma-gl-test/raw/*

  # Allow the container to read / write to DynamoDB (metadata)
  EcsDynamoDBPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: okgl-ecs-dynamodb
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: ReadWriteMetadataTable
            Effect: Allow
            Action:
              - dynamodb:GetItem
              - dynamodb:PutItem
            Resource:
              - !Sub arn:${AWS::Partition}:dynamodb:${AWS::Region}:${AWS::AccountId}:table/okgl-metadata

  # Step Functions Role and Policy
  StepFunctionsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: okgl-stepfunctions-execution-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref StepFunctionsPolicy

  StepFunctionsPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: okgl-stepfunctions-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # Start the ingestion container scoped to okgl-pipeline so any new image revision is covered
          - Sid: EcsRunTask
            Effect: Allow
            Action:
              - ecs:RunTask
            Resource:
              - !Sub arn:${AWS::Partition}:ecs:${AWS::Region}:${AWS::AccountId}:task-definition/okgl-pipeline:*
          # Poll task status until it finishes or stop it if the execution is aborted mid-run
          # Task ARNs are assigned at runtime so * is needed
          - Sid: EcsManageTasks
            Effect: Allow
            Action:
              - ecs:StopTask
              - ecs:DescribeTasks
            Resource: '*'
          # Step Functions creates a temporary EventBridge rule under the hood to detect when the
          # ECS task completes (.sync)
          - Sid: EventBridgeForEcsSync
            Effect: Allow
            Action:
              - events:PutTargets
              - events:PutRule
              - events:DescribeRule
            Resource: '*'
          # Pass task roles to ECS at launch time
          - Sid: PassEcsRoles
            Effect: Allow
            Action:
              - iam:PassRole
            Resource:
              - !GetAtt EcsTaskExecutionRole.Arn
              - !GetAtt EcsTaskRole.Arn
          # Start the Glue job and poll it until completion
          - Sid: GlueJobControl
            Effect: Allow
            Action:
              - glue:StartJobRun
              - glue:GetJobRun
              - glue:GetJobRuns
              - glue:BatchStopJobRun
            Resource:
              - !Sub arn:${AWS::Partition}:glue:${AWS::Region}:${AWS::AccountId}:job/okgl-raw-to-silver-backfill

  # EventBridge Scheduler Role allows the scheduler to start the Step Functions state machine
  EventBridgeSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: okgl-eventbridge-scheduler-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Ref EventBridgeSchedulerPolicy

  # Allow the scheduler to trigger the okgl-pipeline state machine only
  EventBridgeSchedulerPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: okgl-eventbridge-scheduler-policy
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: StartStateMachine
            Effect: Allow
            Action:
              - states:StartExecution
            Resource:
              - !Sub arn:${AWS::Partition}:states:${AWS::Region}:${AWS::AccountId}:stateMachine:okgl-pipeline
